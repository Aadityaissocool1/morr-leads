<!DOCTYPE html>
<html>
<head>
<title>Top Leads</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #020617);
    color: white;
    margin: 0;
    padding: 40px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 20px;
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    flex: 1;
    padding: 20px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    text-align: center;
}

.stat-number {
    font-size: 28px;
    font-weight: bold;
}

.stat-label {
    color: #94a3b8;
    margin-top: 5px;
}

.high-card {
    border: 1px solid rgba(239,68,68,0.4);
}

.medium-card {
    border: 1px solid rgba(245,158,11,0.4);
}

/* SEARCH */
.controls {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
}

/* CARD */
.card {
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    background: rgba(255,255,255,0.08);
}

.name {
    font-size: 18px;
    font-weight: bold;
}

.company {
    color: #94a3b8;
}

.right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.tag {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
}

.high { background: #ef4444; }
.medium { background: #f59e0b; }

.score {
    background: #10b981;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
}

button {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h1>🔥 Top Leads</h1>
<div class="subtitle">Smart prioritized contacts</div>

<!-- STATS -->
<div class="stats">
    <div class="stat-card">
        <div class="stat-number" id="total">0</div>
        <div class="stat-label">Total Leads</div>
    </div>

    <div class="stat-card high-card">
        <div class="stat-number" id="high">0</div>
        <div class="stat-label">High Priority</div>
    </div>

    <div class="stat-card medium-card">
        <div class="stat-number" id="medium">0</div>
        <div class="stat-label">Medium Priority</div>
    </div>
</div>

<!-- SEARCH -->
<div class="controls">
<input placeholder="Search name..." />
<select>
<option>All</option>
</select>
</div>

<div id="list"></div>

<script src="data.js"></script>

<script>
const container = document.getElementById("list");

function render() {

    container.innerHTML = "";

    let total = data.length;
    let high = data.filter(x => x.priority === "high").length;
    let medium = data.filter(x => x.priority === "medium").length;

    document.getElementById("total").innerText = total;
    document.getElementById("high").innerText = high;
    document.getElementById("medium").innerText = medium;

    data.forEach(item => {
        container.innerHTML += `
        <div class="card">
            <div>
                <div class="name">${item.name}</div>
                <div class="company">${item.company}</div>
            </div>

            <div class="right">
                <div class="score">Score: ${item.score}</div>
                <div class="tag ${item.priority}">${item.priority}</div>
                <button>Mark</button>
            </div>
        </div>
        `;
    });
}

render();
</script>

</body>
</html>
